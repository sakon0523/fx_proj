  space:
    name: "宇宙"
    target_ratio: 0.15
    description: "宇宙関連企業（SpaceX含む）"

  defense:
    name: "防衛"
    target_ratio: 0.10
    description: "防衛関連企業"

  us_index:
    name: "米国インデックス"
    target_ratio: 0.35
    description: "S&P500インデックス"

  commodity:
    name: "コモディティ"
    target_ratio: 0.05
    description: "金など実物資産"

  semiconductor:
    name: "半導体"
    target_ratio: 0.05
    description: "個別半導体銘柄"

  telecom:
    name: "通信"
    target_ratio: 0.03
    description: "国内通信・インフラ"

  robotics:
    name: "ロボティクス"
    target_ratio: 0.02
    description: "自動化・ロボティクス"

monitoring:
  defaults:
    daily_move_alert_pct: 5.0
    volume_spike_ratio: 2.0
    price_up_min_pct: 2.0
    atr_alert_multiplier: 2.0
    rsi_lower: 30.0
    rsi_upper: 70.0
    category_daily_move_alert_pct: 3.0
    category_min_assets: 2

  categories:
    semiconductor:
      daily_move_alert_pct: 4.0
      volume_spike_ratio: 1.8

    space:
      daily_move_alert_pct: 6.0
      category_daily_move_alert_pct: 4.0

    telecom:
      daily_move_alert_pct: 2.0

  assets:
    nvidia:
      daily_move_alert_pct: 4.0
      rsi_upper: 75.0

    rocket_lab:
      daily_move_alert_pct: 8.0
      volume_spike_ratio: 2.5

    ntt:
      daily_move_alert_pct: 2.0

    nebius:
      daily_move_alert_pct: 7.0
