env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

name: Portfolio Automation

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 * * * *"

jobs:
  portfolio-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore portfolio configs
        env:
          PORTFOLIO_YAML: ${{ secrets.PORTFOLIO_YAML }}
          PORTFOLIO_PRIVATE_YAML: ${{ secrets.PORTFOLIO_PRIVATE_YAML }}
        run: |
          mkdir -p config
          if [ -z "$PORTFOLIO_YAML" ]; then
            echo "PORTFOLIO_YAML is not configured."
            exit 1
          fi

          if [ -z "$PORTFOLIO_PRIVATE_YAML" ]; then
            echo "PORTFOLIO_PRIVATE_YAML is not configured."
            exit 1
          fi

          printf "%s" "$PORTFOLIO_YAML" > config/portfolio.yaml
          printf "%s" "$PORTFOLIO_PRIVATE_YAML" > config/portfolio.private.yaml

      - name: Fetch latest prices
        run: python run.py --action fetch --quiet

      - name: Generate reports and signals
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_NEWS_MODEL: ${{ secrets.OPENAI_NEWS_MODEL }}
        run: python run.py --action all --quiet

      - name: Determine email mode
        id: email_mode
        run: |
          JST_HOUR=$(TZ=Asia/Tokyo date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=daily_digest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "mode=daily_digest" >> "$GITHUB_OUTPUT"
          elif [ "$JST_HOUR" = "08" ]; then
            echo "mode=daily_digest" >> "$GITHUB_OUTPUT"
          else
            echo "mode=high_only" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Gmail report
        env:
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_SMTP_APP_PASSWORD: ${{ secrets.GMAIL_SMTP_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        run: |
          if [ -z "$GMAIL_SMTP_USER" ] || [ -z "$GMAIL_SMTP_APP_PASSWORD" ] || [ -z "$GMAIL_TO" ]; then
            echo "Skip email: Gmail secrets are not fully configured."
            exit 0
          fi

          python run.py --action email --email-mode ${{ steps.email_mode.outputs.mode }} --quiet
